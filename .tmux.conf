##### --- Core Settings ---
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g allow-rename off
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB'

##### --- Status Line ---
set -g status on
set -g status-interval 2
set -g status-left-length 60
set -g status-right-length 90
set -g status-style bg=#1a0a0a,fg=green

##### --- Split Panes (Vim-style) ---
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

##### --- Reload Config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded."

##### --- Pane Navigation (Vim-style) ---
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##### --- Resize Panes ---
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5

##### --- Copy Mode (Vim-like) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDrag1Pane select-pane \; send-keys -X begin-selection

##### --- Quality of Life ---
set -g set-clipboard on               # sync with system clipboard
set -g display-time 2000              # status messages duration
set -g renumber-windows on
set -g detach-on-destroy off
set -g focus-events on

##### --- Aesthetic Tweaks (optional) ---
set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=green
set -g message-style bg=black,fg=green
set -g mode-style bg=colour236,fg=colour255

