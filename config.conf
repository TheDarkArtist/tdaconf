# tdaconf — source list (lab VM config)
# Paths relative to $HOME. Directories need trailing /
# Lines starting with ! are ignore patterns (matched inside tracked dirs)

# Window manager + compositor + bar + launcher
.config/i3/
.config/picom.conf
.config/polybar/
.config/rofi/

# Terminal
.config/alacritty/

# Editor
.config/nvim/

# Appearance
.config/gtk-3.0/settings.ini

# Polybar scripts + sounds + wallpapers
.local/share/scripts/
.local/share/sounds/
.local/share/wallpapers/

# Custom utility scripts
.local/share/bin/

# Shell
.zshrc
.zsh_aliases
.zsh_functions
.profile
.xprofile
.xinitrc
.p10k.zsh

# Terminal multiplexer
.tmux.conf

# Git (sanitized on capture)
.gitconfig

# Ignore patterns — skip these even inside tracked directories
!*.bak
!*.bak2
!*.bak3
!*.log
!*.swp
!*.swo
!lazy-lock.json
!ipclip
!.netrwhist
!hosts.yml
!tdaconf
!protonvpn*
!vpn-leakguard*
