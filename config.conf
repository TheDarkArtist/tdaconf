.config/i3/
.config/picom.conf
.config/polybar/
.config/rofi/

# Terminal
.config/alacritty/

# Editor
.config/nvim/

# Appearance
.config/gtk-3.0/settings.ini

# App configs
.config/flameshot/
.config/gh/config.yml

# Audio
.config/pipewire/
.config/wireplumber/

# Polybar scripts + sounds + wallpapers
.local/share/scripts/
.local/share/sounds/
.local/share/wallpapers/

# Custom utility scripts
.local/share/bin/

# Shell
.zshrc
.zsh_aliases
.zsh_functions
.profile
.xprofile
.xinitrc
.p10k.zsh

# Terminal multiplexer
.tmux.conf

# Default app associations
.config/mimeapps.list

