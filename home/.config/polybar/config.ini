; Import files
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
;==========================================================

[bar/bar]
width = 100%
height = 20pt
radius = 2
underline-size = 0
dpi = 96
background = ${tda.zinc900}
foreground = ${tda.cyan600}
line-size = 2
border-bottom-size = 1pt
border-bottom-color = ${tda.zinc700}
module-margin = 1
padding-left=0pt
padding-right=4pt
separator = ""
separator-foreground = ${tda.sky}

; Fonts
font-0 = "Arimo Nerd Font:size=12:weight=bold;2"
font-1 = "FiraCode Nerd Font Mono:size=18:weight=bold"

modules-left = rofi ss i3 xwindow
modules-right = timer ss numkey xkeyboard ss uptime ss filesystem ss cpu ss temp ss memory ss eth ss wifi ss protonvpn ss time ss tray

cursor-click = pointer
; cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3
